name: Deploy datakwaba.com to VPS

on:
  push:
    branches: [ main ]  # Déclenche le déploiement quand tu pousses sur main
  workflow_dispatch:    # Permet de lancer manuellement le déploiement depuis l'onglet Actions

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code source
        uses: actions/checkout@v4

      - name: ⚙️ Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🏗️ Build du projet Next.js
        run: npm run build

      - name: 🚀 Déploiement vers le VPS via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.next/cache'
          path: ./
          remote_path: /var/www/datakwaba.com/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: 🔄 Redémarrage de l'application sur le VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/datakwaba.com
            npm ci --omit=dev  # Installe uniquement les dépendances de production
            pm2 restart datakwaba-front || pm2 start npm --name "datakwaba-front" -- start -- --port 3002
            pm2 save